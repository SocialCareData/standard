---
layout: default
---

<p class="publish-dates">Published <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>{% if page.last_modified %}; Last updated <time datetime="{{ page.last_modified | date_to_xmlschema }}">{{ page.last_modified | date: "%-d %B %Y" }}</time>{% endif %}.</p>

<nav class="toc numbered-toc">

    <h2 id="table-of-contents">Table of Contents</h2>

    {% toc %}

</nav>

<article class="numbered-headings">

    {{ content }}

</article>
