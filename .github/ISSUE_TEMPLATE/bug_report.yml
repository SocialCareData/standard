name: Bug report
description: Report a bug with the website itself (layout, build, search, links, etc.).
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include any error messages, console output, or screenshots.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      description: The page where you saw the bug, if applicable.
      placeholder: https://standard.socialcaredata.io/...
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: e.g. Firefox 124 on macOS 14, Chrome on Android 14
    validations:
      required: false
